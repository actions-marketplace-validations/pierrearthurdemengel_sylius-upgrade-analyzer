security:
    encoders:
        Sylius\Component\User\Model\UserInterface:
            algorithm: argon2i
        App\Entity\Customer\Customer:
            algorithm: bcrypt
            cost: 13

    firewalls:
        new_api_admin_user:
            pattern: '%sylius.security.new_api_route%/admin'
            stateless: true
            json_login:
                check_path: '%sylius.security.new_api_admin_route%/authentication-token'

        new_api_shop_user:
            pattern: '%sylius.security.new_api_route%/shop'
            stateless: true
            json_login:
                check_path: '%sylius.security.new_api_shop_route%/authentication-token'

    access_control:
        - { path: '%sylius.security.new_api_regex%', role: ROLE_API_ACCESS }
        - { path: '%sylius.security.new_api_admin_regex%', role: ROLE_ADMIN }
        - { path: '%sylius.security.new_api_shop_regex%', role: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: '%sylius.security.new_api_user_account_regex%', role: ROLE_USER }
        - { path: '%sylius.security.new_api_user_account_route%', role: ROLE_USER }
